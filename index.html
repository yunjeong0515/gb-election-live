<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>실시간 개표 현황</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body class="body">
    <header class="header">
      <div class="live-wrap">
        <div class="live-icon">
          <img src="images/live.svg" alt="live" />
        </div>
        <span class="date font_aone">4월 11일 (토)</span>
      </div>
      <div class="title">
        <img src="images/title.svg" alt="실시간 개표 현황" />
      </div>
    </header>
    <main class="vote-wrap">
      <div class="vote-main">
        <!-- 캐릭터 A -->
        <div class="vote-character vote-a">
          <!-- 상태별 캐릭터 이미지 -->
          <div class="character-img character-img-default">
            <img src="images/juisoon_default.svg" alt="쥐순 기본" />
          </div>
          <div class="character-img character-img-winning">
            <img
              class="character"
              src="images/juisoon_winning.svg"
              alt="쥐순 winning"
            />
            <img
              class="bg"
              src="images/juisoon_winning_bg.svg"
              alt="쥐순 winning bg"
            />
          </div>
          <div class="character-img character-img-losing">
            <img src="images/juisoon_losing.svg" alt="쥐순 losing" />
          </div>
          <div class="lead-icon">
            <img src="images/lead.svg" alt="유력" />
          </div>
          <!-- 말풍선 여러 개 -->
          <div class="winning-text">
            <img src="images/juisoon_text_win.svg" alt="" />
          </div>
          <div class="default-text text01">
            <img
              class="character-text character-text-default"
              src="images/juisoon_text01.svg"
              alt="쥐순 기본 텍스트"
            />
          </div>
          <div class="default-text text02">
            <img
              class="character-text character-text-default"
              src="images/juisoon_text02.svg"
              alt="쥐순 기본 텍스트"
            />
          </div>
          <div class="default-text text03">
            <img
              class="character-text character-text-default"
              src="images/juisoon_text03.svg"
              alt="쥐순 기본 텍스트"
            />
          </div>
          <div class="default-text text04">
            <img
              class="character-text character-text-default"
              src="images/juisoon_text04.svg"
              alt="쥐순 기본 텍스트"
            />
          </div>
        </div>

        <!-- 캐릭터 B -->
        <div class="vote-character vote-b">
          <div class="character-img character-img-default">
            <img src="images/ttora_default.svg" alt="또라 기본" />
          </div>
          <div class="character-img character-img-winning">
            <img
              class="character"
              src="images/ttora_winning.svg"
              alt="또라 winning"
            />
            <img
              class="bg"
              src="images/ttora_winning_bg.svg"
              alt="쥐순 winning bg"
            />
          </div>
          <div class="character-img character-img-losing">
            <img src="images/ttora_losing.svg" alt="또라 losing" />
          </div>
          <div class="lead-icon">
            <img src="images/lead.svg" alt="유력" />
          </div>
          <div class="winning-text">
            <img src="images/ttora_text_win.svg" alt="" />
          </div>
          <div class="default-text text01">
            <img
              class="character-text character-text-default"
              src="images/ttora_text01.svg"
              alt="쥐순 기본 텍스트"
            />
          </div>
          <div class="default-text text02">
            <img
              class="character-text character-text-default"
              src="images/ttora_text02.svg"
              alt="쥐순 기본 텍스트"
            />
          </div>
          <div class="default-text text03">
            <img
              class="character-text character-text-default"
              src="images/ttora_text03.svg"
              alt="쥐순 기본 텍스트"
            />
          </div>
          <div class="default-text text04">
            <img
              class="character-text character-text-default"
              src="images/ttora_text04.svg"
              alt="쥐순 기본 텍스트"
            />
          </div>
        </div>
      </div>
      <div class="vote-bar-wrap">
        <span class="vote-label vote-label-a">
          <img src="images/juisoon_label.svg" alt="쥐순" />
        </span>

        <div class="vote-bar">
          <div class="vote-progress">
            <div class="progress-a">
              <span>50%</span>
            </div>
            <div class="progress-b">
              <span>50%</span>
            </div>
          </div>
        </div>

        <span class="vote-label vote-label-b">
          <img src="images/ttora_label.svg" alt="또라" />
        </span>
      </div>
    </main>
    <script>
      // ===== 상태 =====
      let percentA = 55;
      let percentB = 45;

      let currentTextIndex = 0;
      let prevIsLeading = false; // 이전 상태 기억

      // ===== DOM =====
      const progressA = document.querySelector(".progress-a");
      const progressB = document.querySelector(".progress-b");
      const spanA = progressA.querySelector("span");
      const spanB = progressB.querySelector("span");

      const charA = document.querySelector(".vote-a");
      const charB = document.querySelector(".vote-b");

      const leadA = charA.querySelector(".lead-icon");
      const leadB = charB.querySelector(".lead-icon");

      const textWinA = charA.querySelector(".winning-text");
      const textWinB = charB.querySelector(".winning-text");

      const defaultTextsA = charA.querySelectorAll(".default-text");
      const defaultTextsB = charB.querySelectorAll(".default-text");

      // ===== 유틸 =====
      function showDefaultText(index) {
        defaultTextsA.forEach((el, i) => {
          el.classList.toggle("text-show", i === index);
        });
        defaultTextsB.forEach((el, i) => {
          el.classList.toggle("text-show", i === index);
        });
      }

      function hideAllDefaultText() {
        defaultTextsA.forEach((el) => el.classList.remove("text-show"));
        defaultTextsB.forEach((el) => el.classList.remove("text-show"));
      }

      // ===== 말풍선 순환 =====
      function rotateDefaultText() {
        if (percentA >= 60 || percentB >= 60) return;

        showDefaultText(currentTextIndex);
        currentTextIndex = (currentTextIndex + 1) % defaultTextsA.length;
      }

      // ===== 메인 업데이트 =====
      function updateVote() {
        // 바
        progressA.style.width = percentA / 2 + "%";
        progressB.style.width = percentB / 2 + "%";

        // 퍼센트
        spanA.style.display = percentA === 0 ? "none" : "inline";
        spanA.textContent = percentA + "%";

        spanB.style.display = percentB === 0 ? "none" : "inline";
        spanB.textContent = percentB + "%";

        // 캐릭터
        const imgADef = charA.querySelector(".character-img-default");
        const imgAWin = charA.querySelector(".character-img-winning");
        const imgALose = charA.querySelector(".character-img-losing");

        const imgBDef = charB.querySelector(".character-img-default");
        const imgBWin = charB.querySelector(".character-img-winning");
        const imgBLose = charB.querySelector(".character-img-losing");

        const isALeading = percentA >= 60 && percentA > percentB;
        const isBLeading = percentB >= 60 && percentB > percentA;
        const isLeading = isALeading || isBLeading;

        // ===== 상태 전환 감지 (핵심🔥) =====
        if (prevIsLeading && !isLeading) {
          // 👉 유력 → 기본 돌아올 때
          currentTextIndex = 0;
          showDefaultText(0);
        }
        prevIsLeading = isLeading;

        // ===== 캐릭터 상태 =====
        if (isALeading) {
          imgADef.style.display = "none";
          imgAWin.style.display = "block";
          imgALose.style.display = "none";

          imgBDef.style.display = "none";
          imgBWin.style.display = "none";
          imgBLose.style.display = "block";
        } else if (isBLeading) {
          imgBDef.style.display = "none";
          imgBWin.style.display = "block";
          imgBLose.style.display = "none";

          imgADef.style.display = "none";
          imgAWin.style.display = "none";
          imgALose.style.display = "block";
        } else {
          imgADef.style.display = "block";
          imgAWin.style.display = "none";
          imgALose.style.display = "none";

          imgBDef.style.display = "block";
          imgBWin.style.display = "none";
          imgBLose.style.display = "none";
        }

        // ===== 유력 / 승리 텍스트 =====
        if (isALeading) {
          leadA.classList.add("active");
          textWinA.classList.add("text-show");

          leadB.classList.remove("active");
          textWinB.classList.remove("text-show");

          hideAllDefaultText();
        } else if (isBLeading) {
          leadB.classList.add("active");
          textWinB.classList.add("text-show");

          leadA.classList.remove("active");
          textWinA.classList.remove("text-show");

          hideAllDefaultText();
        } else {
          leadA.classList.remove("active");
          leadB.classList.remove("active");
          textWinA.classList.remove("text-show");
          textWinB.classList.remove("text-show");
        }
      }

      // ===== 랜덤 시뮬 =====
      function simulateVoteChange() {
        const changeA = Math.floor(Math.random() * 21) - 10; // -10~10
        percentA = Math.min(100, Math.max(0, percentA + changeA));
        percentB = 100 - percentA;

        updateVote();
      }

      // ===== 실행 =====
      updateVote();
      showDefaultText(0);

      setInterval(rotateDefaultText, 2500); // 말풍선
      setInterval(simulateVoteChange, 1500); // 수치 변화
    </script>
